# Alembic 数据库迁移配置
# MySQL 5.7 兼容设置

[alembic]
# 脚本目录
script_location = alembic

# SQLAlchemy URL — 从环境变量加载
sqlalchemy.url = mysql+asyncmy://root:password@localhost:3306/fastapi_crm?charset=utf8mb4

# 禁用事务型 DDL（MySQL 部分 DDL 不支持下被回滚）
transaction_per_migration = False

# 日志
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
