{% extends "layouts/base.html" %}
{% block title %}营销活动 — CRM{% endblock %}
{% block page_title %}营销管理{% endblock %}
{% block breadcrumb_active %}活动列表{% endblock %}
{% block page_actions %}<a href="/campaigns/create" class="btn btn-primary"><i class="ti ti-plus me-1"></i> 新建活动</a>{% endblock %}
{% block content %}
<div class="card"><div class="table-responsive">
<table class="table table-vcenter card-table table-hover">
    <thead><tr><th>活动名称</th><th>类型</th><th>预算</th><th>实际花费</th><th>状态</th><th>起止时间</th><th></th></tr></thead>
    <tbody id="tbody"><tr><td colspan="7" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr></tbody>
</table></div></div>
{% endblock %}
{% block scripts %}
<script>
const API = '/api/v1/campaigns';
const sLabel = {planning:'计划中',active:'进行中',completed:'已完成',cancelled:'已取消'};
const sBadge = {planning:'bg-blue',active:'bg-success',completed:'bg-secondary',cancelled:'bg-danger'};
const tLabel = {offline:'线下活动',online:'线上',email:'邮件',social:'社交媒体',other:'其他'};
(async function(){
    const res = await fetch(API, {headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}});
    const d = (await res.json());
    const tbody = document.getElementById('tbody');
    if (!d.data.length) tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon"><i class="ti ti-megaphone"></i></div><h3>暂无活动</h3></div></td></tr>';
    else tbody.innerHTML = d.data.map(c => `<tr>
        <td><span class="fw-medium">${escapeHtml(c.name)}</span></td>
        <td>${tLabel[c.campaign_type]||c.campaign_type}</td>
        <td>${c.budget ? '¥'+c.budget.toLocaleString() : '—'}</td>
        <td>${c.actual_cost ? '¥'+c.actual_cost.toLocaleString() : '—'}</td>
        <td><span class="badge ${sBadge[c.status]||'bg-secondary'}">${sLabel[c.status]||c.status}</span></td>
        <td class="text-muted">${c.start_date||'—'} ~ ${c.end_date||'—'}</td>
        <td><a href="#" class="btn btn-sm btn-icon text-danger" onclick="del(${c.id})"><i class="ti ti-trash"></i></a></td>
    </tr>`).join('');
})();
async function del(id) { if (!confirm('确定删除？')) return; await fetch(API+'/'+id, {method:'DELETE', headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}}); location.reload(); }
</script>
{% endblock %}
