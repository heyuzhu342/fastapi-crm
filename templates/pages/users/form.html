{% extends "layouts/base.html" %}
{% block title %}用户 — CRM{% endblock %}
{% block page_title %}<span id="form-title">添加用户</span>{% endblock %}
{% block breadcrumb_active %}<a href="/users">用户列表</a> / <span id="crumb-title">添加</span>{% endblock %}
{% block content %}
<div class="row"><div class="col-lg-7"><div class="card"><div class="card-header"><h3 class="card-title">用户信息</h3></div><div class="card-body">
<form id="form">
    <div class="row mb-3">
        <div class="col-md-4"><label class="form-label required">用户名</label><input type="text" class="form-control" name="username" required id="f-username"></div>
        <div class="col-md-4"><label class="form-label">姓名</label><input type="text" class="form-control" name="full_name"></div>
        <div class="col-md-4"><label class="form-label">英文名</label><input type="text" class="form-control" name="english_name"></div>
    </div>
    <div class="mb-3"><label class="form-label">个性宣言</label><input type="text" class="form-control" name="motto" placeholder="一句话介绍自己"></div>
    <div class="row mb-3">
        <div class="col-md-6"><label class="form-label">邮箱</label><input type="email" class="form-control" name="email"></div>
        <div class="col-md-6"><label class="form-label">手机号</label><input type="tel" class="form-control" name="phone"></div>
    </div>
    <div class="row mb-3">
        <div class="col-md-4"><label class="form-label">职位</label><input type="text" class="form-control" name="position"></div>
        <div class="col-md-4"><label class="form-label">部门</label><select class="form-select" name="department_id" id="dept-select"><option value="">请选择</option></select></div>
        <div class="col-md-4"><label class="form-label">状态</label><select class="form-select" name="is_active"><option value="true">启用</option><option value="false">禁用</option></select></div>
    </div>
    <div class="row mb-3" id="pwd-row">
        <div class="col-md-6"><label class="form-label required">密码</label><input type="password" class="form-control" name="password" minlength="6"></div>
    </div>
    <div class="mb-3"><label class="form-label">角色</label><select class="form-select" name="role_ids" id="role-select" multiple size="4"><option value="">加载中...</option></select></div>
    <div id="msg" class="alert d-none"></div>
    <button type="submit" class="btn btn-primary" id="btn-submit"><i class="ti ti-device-floppy me-1"></i>保存</button>
    <a href="/users" class="btn btn-outline-secondary ms-2">取消</a>
</form>
</div></div></div></div>
{% endblock %}
{% block scripts %}
<script>
const p = window.location.pathname.split('/');
const isEdit = p.includes('edit');
const userId = isEdit ? p[p.indexOf('users')+1] : null;

async function init(){
    const [deptRes, roleRes] = await Promise.all([
        fetch('/api/v1/users/departments/tree', {headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}}),
        fetch('/api/v1/users/roles/all', {headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}})
    ]);
    const selDept = document.getElementById('dept-select');
    function addDepts(list, prefix=''){ list.forEach(d=>{ selDept.innerHTML+=`<option value="${d.id}">${prefix}${d.name}</option>`; if(d.children)addDepts(d.children,prefix+'├ '); }); }
    addDepts((await deptRes.json()).data||[]);

    const roles = (await roleRes.json()).data||[];
    const selRole = document.getElementById('role-select');
    selRole.innerHTML = '';
    roles.forEach(r => { selRole.innerHTML += `<option value="${r.id}">${r.name}</option>`; });

    if (!isEdit) return;
    document.getElementById('form-title').textContent = '编辑用户';
    document.getElementById('crumb-title').textContent = '编辑';
    document.getElementById('pwd-row').innerHTML = '<div class="col-md-6"><label class="form-label">新密码</label><input type="password" class="form-control" name="password" minlength="6" placeholder="留空则不修改"></div>';
    document.getElementById('f-username').disabled = true;

    const res = await fetch('/api/v1/users/'+userId, {headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}});
    const u = (await res.json()).data;
    document.querySelectorAll('#form [name]').forEach(el => {
        if (el.name === 'is_active') { el.value = u.is_active ? 'true' : 'false'; return; }
        if (el.name === 'department_id') { el.value = u.department_id || ''; return; }
        if (el.name === 'role_ids') {
            Array.from(el.options).forEach(o => { if ((u.roles||[]).some(r=>r.id==o.value)) o.selected=true; });
            return;
        }
        if (u[el.name] != null) el.value = u[el.name];
    });
}

document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    const fd = new FormData(this);
    const data = Object.fromEntries(fd);
    data.role_ids = fd.getAll('role_ids').map(Number);
    try { data.department_id = parseInt(data.department_id) || null; } catch(e) { data.department_id = null; }
    if (!data.password) delete data.password;
    data.is_active = data.is_active === 'true';

    const url = isEdit ? '/api/v1/users/'+userId : '/api/v1/users';
    const method = isEdit ? 'PUT' : 'POST';
    const res = await fetch(url, {method, headers:{'Content-Type':'application/json',Authorization:'Bearer '+localStorage.getItem('access_token')}, body:JSON.stringify(data)});
    const d = await res.json();
    const msg = document.getElementById('msg');
    if (res.ok) { window.location.href = '/users'; }
    else { msg.textContent = d.detail||d.message||'保存失败'; msg.className = 'alert alert-danger'; }
});

init();
</script>
{% endblock %}
