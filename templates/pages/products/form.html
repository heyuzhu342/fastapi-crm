{% extends "layouts/base.html" %}

{% block title %}编辑产品 — FastAPI CRM{% endblock %}
{% block page_title %}<span id="form-title">添加产品</span>{% endblock %}
{% block breadcrumb_active %}<a href="/products">产品列表</a> / <span id="crumb-title">添加</span>{% endblock %}

{% block content %}
<div class="row">
    <div class="col-lg-8">
        <div class="card">
            <div class="card-header"><h3 class="card-title">产品信息</h3></div>
            <div class="card-body">
                <form id="product-form">
                    <div class="row mb-3">
                        <div class="col-md-7">
                            <label class="form-label required">产品名称</label>
                            <input type="text" class="form-control" name="name" required placeholder="请输入产品名称">
                        </div>
                        <div class="col-md-5">
                            <label class="form-label">SKU</label>
                            <input type="text" class="form-control" name="sku" placeholder="自动生成或手动输入">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">分类</label>
                            <select class="form-select" name="category_id" id="form-category">
                                <option value="">请选择分类</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label required">售价 (¥)</label>
                            <input type="number" class="form-control" name="price" step="0.01" min="0" value="0" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">成本价 (¥)</label>
                            <input type="number" class="form-control" name="cost" step="0.01" min="0">
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">库存</label>
                            <input type="number" class="form-control" name="stock" min="0" value="0">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">单位</label>
                            <select class="form-select" name="unit">
                                <option value="pcs">件 (pcs)</option>
                                <option value="kg">千克 (kg)</option>
                                <option value="set">套 (set)</option>
                                <option value="box">箱 (box)</option>
                                <option value="hour">小时 (hour)</option>
                                <option value="day">天 (day)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">状态</label>
                            <select class="form-select" name="is_active">
                                <option value="true">上架</option>
                                <option value="false">下架</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">规格参数</label>
                        <textarea class="form-control" name="specification" rows="2" placeholder="如：颜色:黑/白, 尺寸:15寸, 材质:铝合金"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">产品描述</label>
                        <textarea class="form-control" name="description" rows="3" placeholder="请输入产品描述"></textarea>
                    </div>
                    <div class="form-footer">
                        <button type="submit" class="btn btn-primary" id="btn-submit">
                            <i class="ti ti-device-floppy me-1"></i> 保 存
                        </button>
                        <a href="/products" class="btn btn-outline-secondary ms-2">取 消</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const pathParts = window.location.pathname.split('/');
const isEdit = pathParts.includes('edit');
const productId = isEdit ? pathParts[pathParts.indexOf('products') + 1] : null;
const API = '/api/v1/products';

async function loadCategories() {
    const res = await fetch(API + '/categories/tree', {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
    });
    const cats = (await res.json()).data || [];
    const sel = document.getElementById('form-category');
    function addOptions(list, prefix = '') {
        list.forEach(c => {
            sel.innerHTML += `<option value="${c.id}">${prefix}${c.name}</option>`;
            if (c.children) addOptions(c.children, prefix + '├ ');
        });
    }
    addOptions(cats);
}

async function init() {
    await loadCategories();
    if (!isEdit) return;

    document.getElementById('form-title').textContent = '编辑产品';
    document.getElementById('crumb-title').textContent = '编辑';

    const res = await fetch(API + '/' + productId, {
        headers: { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }
    });
    const d = (await res.json()).data;
    const form = document.getElementById('product-form');
    for (let key of ['name','sku','category_id','price','cost','stock','unit','description','specification']) {
        const el = form.querySelector('[name="' + key + '"]');
        if (el && d[key] != null) el.value = d[key];
    }
    if (d.is_active !== undefined) {
        form.querySelector('[name="is_active"]').value = d.is_active ? 'true' : 'false';
    }
}

document.getElementById('product-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 保存中...';

    const fd = new FormData(this);
    const data = Object.fromEntries(fd);
    // Convert types
    data.price = parseFloat(data.price) || 0;
    data.cost = data.cost ? parseFloat(data.cost) : null;
    data.stock = parseInt(data.stock) || 0;
    data.category_id = data.category_id ? parseInt(data.category_id) : null;
    data.is_active = data.is_active === 'true';

    const url = isEdit ? API + '/' + productId : API;
    const method = isEdit ? 'PUT' : 'POST';

    const res = await fetch(url, {
        method, headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + localStorage.getItem('access_token') },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        window.location.href = '/products';
    } else {
        const err = await res.json();
        alert(err.detail || err.message || '保存失败');
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i> 保 存';
    }
});

init();
</script>
{% endblock %}
