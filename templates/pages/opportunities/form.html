{% extends "layouts/base.html" %}
{% block title %}商机 — FastAPI CRM{% endblock %}
{% block page_title %}<span id="form-title">新建商机</span>{% endblock %}
{% block breadcrumb_active %}<a href="/opportunities">商机列表</a> / 新建{% endblock %}
{% block content %}
<div class="row"><div class="col-lg-8"><div class="card"><div class="card-header"><h3 class="card-title">商机信息</h3></div><div class="card-body">
<form id="form">
    <div class="mb-3"><label class="form-label required">商机名称</label><input type="text" class="form-control" name="name" required></div>
    <div class="row mb-3">
        <div class="col-md-4"><label class="form-label">预计金额 ¥</label><input type="number" class="form-control" name="amount" step="0.01" min="0"></div>
        <div class="col-md-4"><label class="form-label">成交概率 %</label><input type="number" class="form-control" name="probability" min="10" max="100" value="10"></div>
        <div class="col-md-4"><label class="form-label">预计成交日期</label><input type="date" class="form-control" name="expected_close_date"></div>
    </div>
    <div class="mb-3"><label class="form-label">阶段</label>
        <select class="form-select" name="stage" id="stage-select">
            <option value="initial_contact">初步接触</option><option value="needs_analysis">需求分析</option>
            <option value="quotation">报价</option><option value="negotiation">谈判</option>
        </select></div>
    <div class="mb-3"><label class="form-label">描述</label><textarea class="form-control" name="description" rows="2"></textarea></div>
    <div class="mb-3"><label class="form-label">竞争对手</label><textarea class="form-control" name="competitors" rows="1" placeholder="竞对信息..."></textarea></div>
    <button type="submit" class="btn btn-primary" id="btn-submit"><i class="ti ti-device-floppy me-1"></i>保存</button>
    <a href="/opportunities" class="btn btn-outline-secondary ms-2">取消</a>
</form>
</div></div></div></div>
{% endblock %}
{% block scripts %}
<script>
const p = window.location.pathname.split('/');
const isEdit = p.includes('edit');
const id = isEdit ? p[p.indexOf('opportunities')+1] : null;
const API = '/api/v1/opportunities';

(async function(){
    if (!isEdit) return;
    document.getElementById('form-title').textContent = '编辑商机';
    const res = await fetch(API+'/'+id, {headers:{Authorization:'Bearer '+localStorage.getItem('access_token')}});
    const d = (await res.json()).data;
    document.querySelectorAll('#form [name]').forEach(el => { if (d[el.name] != null) el.value = d[el.name]; });
})();

document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>保存中...';
    const data = Object.fromEntries(new FormData(this));
    if(data.amount) data.amount = parseFloat(data.amount);
    data.probability = parseInt(data.probability) || 10;
    const url = isEdit ? API+'/'+id : API;
    const res = await fetch(url, {method:isEdit?'PUT':'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+localStorage.getItem('access_token')}, body:JSON.stringify(data)});
    if (res.ok) window.location.href='/opportunities';
    else { alert('保存失败'); btn.disabled=false; btn.innerHTML='<i class="ti ti-device-floppy me-1"></i>保存'; }
});
</script>
{% endblock %}
