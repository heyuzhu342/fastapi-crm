{% extends "layouts/base.html" %}
{% block title %}修改密码 — CRM{% endblock %}
{% block page_title %}修改密码{% endblock %}
{% block breadcrumb_active %}个人资料 / 修改密码{% endblock %}
{% block content %}
<div class="row"><div class="col-lg-5"><div class="card"><div class="card-header"><h3 class="card-title">修改密码</h3></div><div class="card-body">
<form id="form">
    <div class="mb-3"><label class="form-label required">旧密码</label><input type="password" class="form-control" name="old_password" required></div>
    <div class="mb-3"><label class="form-label required">新密码</label><input type="password" class="form-control" name="new_password" minlength="6" required></div>
    <div class="mb-3"><label class="form-label required">确认新密码</label><input type="password" class="form-control" name="confirm_password" minlength="6" required></div>
    <div id="msg" class="alert d-none"></div>
    <button type="submit" class="btn btn-primary" id="btn-submit"><i class="ti ti-device-floppy me-1"></i>修改</button>
    <a href="/profile" class="btn btn-outline-secondary ms-2">取消</a>
</form>
</div></div></div></div>
{% endblock %}
{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function(){
document.getElementById('form').addEventListener('submit', async function(e){
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    const msg = document.getElementById('msg');
    const fd = new FormData(this);
    if (fd.get('new_password') !== fd.get('confirm_password')) { msg.textContent='两次新密码不一致'; msg.className='alert alert-danger'; return; }
    btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>修改中...';
    const res = await fetch('/api/v1/auth/change-password', {method:'POST', headers:{'Content-Type':'application/json',Authorization:'Bearer '+localStorage.getItem('access_token')}, body:JSON.stringify(Object.fromEntries(fd))});
    const d = await res.json();
    if (res.ok) { msg.textContent='密码修改成功'; msg.className='alert alert-success'; btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>修改'; btn.disabled=false; }
    else { msg.textContent=d.detail||d.message||'修改失败'; msg.className='alert alert-danger'; btn.disabled=false; btn.innerHTML = '<i class="ti ti-device-floppy me-1"></i>修改'; }
});
});
</script>
{% endblock %}
