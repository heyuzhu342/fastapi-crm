{% extends "layouts/auth.html" %}

{% block title %}登录 — FastAPI CRM{% endblock %}

{% block auth_content %}
<div class="card card-md">
    <div class="card-body">
        <h2 class="card-title text-center mb-4">登录到您的账户</h2>

        <form method="POST" action="/api/v1/auth/login" id="login-form" autocomplete="on">
            <div class="mb-3">
                <label class="form-label" for="username">用户名 / 邮箱</label>
                <div class="input-group input-group-flat">
                    <span class="input-group-text">
                        <i class="ti ti-user"></i>
                    </span>
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="请输入用户名或邮箱" autocomplete="username" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label" for="password">
                    密码
                    <span class="form-label-description">
                        <a href="/forgot-password">忘记密码?</a>
                    </span>
                </label>
                <div class="input-group input-group-flat">
                    <span class="input-group-text">
                        <i class="ti ti-lock"></i>
                    </span>
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="请输入密码" autocomplete="current-password" required>
                    <span class="input-group-text cursor-pointer" onclick="togglePassword()">
                        <i class="ti ti-eye" id="toggle-password-icon"></i>
                    </span>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-check">
                    <input type="checkbox" class="form-check-input" name="remember_me" value="true">
                    <span class="form-check-label">记住我 (7天免登录)</span>
                </label>
            </div>

            <div id="login-error" class="alert alert-danger d-none"></div>

            <div class="form-footer">
                <button type="submit" class="btn btn-primary w-100" id="btn-login">
                    <i class="ti ti-login me-1"></i> 登 录
                </button>
            </div>
        </form>
    </div>

    <div class="card-footer text-center py-3">
        还没有账户？
        <a href="/register" class="text-decoration-none">立即注册</a>
    </div>
</div>
{% endblock %}

{% block head_extra %}
<script>
function togglePassword() {
    const pwd = document.getElementById('password');
    const icon = document.getElementById('toggle-password-icon');
    if (pwd.type === 'password') {
        pwd.type = 'text';
        icon.className = 'ti ti-eye-off';
    } else {
        pwd.type = 'password';
        icon.className = 'ti ti-eye';
    }
}

document.addEventListener('DOMContentLoaded', function() {
document.getElementById('login-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('btn-login');
    const errorBox = document.getElementById('login-error');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span> 登录中...';

    try {
        const formData = new FormData(this);
        const response = await fetch('/api/v1/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: formData.get('username'),
                password: formData.get('password'),
                remember_me: formData.get('remember_me') === 'true'
            })
        });

        const data = await response.json();

        if (response.ok && data.code === 200) {
            // 存储 token
            localStorage.setItem('access_token', data.data.access_token);
            localStorage.setItem('refresh_token', data.data.refresh_token);
            localStorage.setItem('user', JSON.stringify(data.data.user));
            window.location.href = '/';
        } else {
            errorBox.textContent = data.detail || data.message || '登录失败';
            errorBox.classList.remove('d-none');
        }
    } catch (err) {
        errorBox.textContent = '网络错误，请检查连接';
        errorBox.classList.remove('d-none');
    } finally {
        btn.disabled = false;
        btn.innerHTML = '<i class="ti ti-login me-1"></i> 登 录';
    }
});
});  // DOMContentLoaded
</script>
{% endblock %}
